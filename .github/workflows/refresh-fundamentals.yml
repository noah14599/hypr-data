name: Refresh HYPR fundamentals
on:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch: {}
concurrency:
  group: hypr-data
  cancel-in-progress: false
jobs:
  fundamentals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install yfinance
        run: pip install yfinance
      - name: Fetch fundamentals
        run: python fetch_stockdata.py fundamentals
      - name: Commit snapshot
        run: |
          git config user.name "hypr-bot"
          git config user.email "bot@users.noreply.github.com"
          git add stockData.json || true
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "data: refresh"
          for i in 1 2 3; do
            git pull --rebase -X ours origin main || true
            git push origin main && break
            echo "retry $i" && sleep 3
          done
